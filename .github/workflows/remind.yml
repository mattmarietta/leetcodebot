name: LeetCode Discord Reminder

on:
  schedule:
    # 8 am California Time
    - cron: "0 16 * * *"
  workflow_dispatch: {}  

permissions:
  contents: write  

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bot.py

      - name: Commit updated sent_log.json
        run: |
          git config user.name "leetcode-reminder-bot"
          git config user.email "actions@github.com"
          git add sent_log.json
          git diff --cached --quiet || git commit -m "Update sent log [skip ci]"
          git push